name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # Fast, runs on every push: the privacy-critical math, host-native.
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Configure
        run: cmake -S test/host -B build/host -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build/host -j"$(nproc)"
      - name: Test
        run: ctest --test-dir build/host --output-on-failure
      # Lock the Python separability port to detector.c. The committed vectors are
      # C-computed; this fails if rig/separability.py drifts from the C reference.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Detector port parity (host-only, no hardware)
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest tools/onair-test/test_separability_parity.py -v

  # Builds the firmware for the real target with the pinned IDF.
  idf-build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware (esp32s3)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32s3
          idf.py build

  # On-target Unity app build. Compiles the hardware-coupled test app for
  # esp32s3 (BT + Wi-Fi + PSRAM + Unity) so the target paths are link-verified
  # in CI. This is a required, blocking gate.
  target-build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4
      - name: Build target test app (esp32s3)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -C test/target set-target esp32s3 build

  # Running the Unity suite under QEMU. esp32s3 QEMU support is not yet confirmed
  # in CI, so this runs on demand (manual dispatch) rather than gating every PR;
  # the suite runs for real on hardware. Promote to a required check once the
  # esp32s3 QEMU path is validated.
  target-qemu:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4
      - name: Install test harness
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          pip install pytest-embedded pytest-embedded-idf pytest-embedded-qemu
      - name: Build target test app
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -C test/target set-target esp32s3 build
      - name: Run under QEMU
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          pytest test/target --embedded-services idf,qemu --build-dir build
