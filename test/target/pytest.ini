[pytest]
# The on-target Unity driver is named pytest_afterglow.py (the pytest-embedded /
# ESP-IDF convention), which pytest's default collection (test_*.py / *_test.py)
# does NOT discover — so `pytest test/target` collected 0 items and exited 5
# ("no tests ran"). Collect pytest_*.py as well so the QEMU/hardware job actually
# runs the suite.
python_files = pytest_*.py test_*.py
